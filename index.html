
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GENI-ELOMOS-PRO</title>
<style>
body{background:#0b1730;color:white;font-family:Arial;text-align:center;padding:20px}
input{width:90%;padding:15px;margin:10px;border-radius:10px;border:none;font-size:16px}
button{width:90%;padding:15px;background:#22c55e;border:none;border-radius:10px;color:white;font-size:18px}
#result{margin-top:20px;text-align:left;background:#081226;padding:15px;border-radius:10px}
</style>
</head>
<body>

<h2>GENI-ELOMOS-PRO</h2>

<input id="team1" placeholder="Equipe 1">
<input id="team2" placeholder="Equipe 2">
<button onclick="analyse()">Analyser</button>

<div id="result"></div>

<script>
function analyse(){
const t1=document.getElementById("team1").value
const t2=document.getElementById("team2").value
let attack1 = rand(1,3)
let attack2 = rand(1,3)
let score1 = Math.max(0,attack1 + rand(-1,1))
let score2 = Math.max(0,attack2 + rand(-1,1))
let corners = rand(8,14)
let cards = rand(3,7)
let prob1 = rand(35,55)
let prob2 = 100 - prob1 - rand(5,15)
let draw = 100 - prob1 - prob2
document.getElementById("result").innerHTML=`
<h3>${t1} vs ${t2}</h3>
<b>Score exact:</b> ${score1}-${score2}<br><br>
<b>BTTS:</b> ${score1>0 && score2>0 ? "Oui" : "Non"}<br>
<b>Over 2.5:</b> ${(score1+score2)>2 ? "Oui" : "Non"}<br>
<b>Under 3.5:</b> ${(score1+score2)<4 ? "Oui" : "Non"}<br><br>
<b>MT/FT:</b> ${randomHTFT()}<br><br>
<b>Corners estimés:</b> ${corners}<br>
<b>Cartons estimés:</b> ${cards}<br><br>
<b>Prob ${t1}:</b> ${prob1}%<br>
<b>Prob Nul:</b> ${draw}%<br>
<b>Prob ${t2}:</b> ${prob2}%<br>
`
}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function randomHTFT(){
const arr=["1/1","1/X","X/1","2/2","X/X","1/2","2/1"]
return arr[Math.floor(Math.random()*arr.length)]
}
</script>

</body>
</html>

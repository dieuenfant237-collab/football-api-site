
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENI-ELOMOS-PRO</title>
<style>
body{margin:0;font-family:Arial;background:#06142b;color:#fff}
header{background:#0a1f44;padding:15px;text-align:center;font-weight:bold}
.container{padding:15px}
input{width:100%;padding:12px;margin:10px 0;border-radius:6px;border:none}
button{width:100%;padding:14px;background:#22c55e;color:#fff;border:none;border-radius:6px;font-size:16px}
.result{margin-top:20px;background:#0a1f44;padding:15px;border-radius:6px}
</style>
</head>
<body>
<header>GENI-ELOMOS-PRO</header>
<div class="container">
<input id="team1" placeholder="Equipe 1">
<input id="team2" placeholder="Equipe 2">
<button onclick="analyse()">Analyser</button>
<div class="result" id="result">Analyse...</div>
</div>
<script>
async function analyse(){
const t1=document.getElementById('team1').value
const t2=document.getElementById('team2').value
document.getElementById('result').innerText="Analyse en cours..."
const r=await fetch("/api/predict",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({team1:t1,team2:t2})})
const d=await r.json()
document.getElementById('result').innerText=JSON.stringify(d,null,2)
}
</script>
</body>
</html>

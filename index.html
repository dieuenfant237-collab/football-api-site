<!DOCTYPE html>
<html>
<head>

<style>

input{width:90%;padding:15px;margin:10px;border-radius:10px;border:none;font-size:16px}

<body>

<h2>GENI-ELOMOS-PRO</h2>

<button onclick="analyse()">Analyser</button>

<div id="result"></div>

<script>
async function analyse(){
document.getElementById("result").innerHTML="Analyse...";
const res = await fetch("https://corsproxy.io/?https://game-forecast-api.p.rapidapi.com/events?status_code=NOT_STARTED",{
method:"GET",
headers:{
"X-RapidAPI-Key":"8814939dd5msh3d233e8ee7aac4bp195e8cjsn592854cda7e3",
"X-RapidAPI-Host":"game-forecast-api.p.rapidapi.com"
}
});
const data = await res.json();
const m = data[0];
document.getElementById("result").innerHTML=`
<h3>Score Exact: ${m.predictions.score}</h3>
BTTS: ${m.predictions.btts}<br>
Over 2.5: ${m.predictions.over_2_5}<br>
MT/FT: ${m.predictions.ht_ft || "1/1"}<br>
Corners estimés: ${Math.floor(Math.random()*5)+8}<br>
Cartons estimés: ${Math.floor(Math.random()*3)+3}<br>

`;
}
